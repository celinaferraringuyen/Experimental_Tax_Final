<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Decisions Study — UPF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F3EF;--card:#FFFFFF;--border:#E2E1DC;--border2:#CECCC5;
  --text:#1A1917;--muted:#6B6966;--faint:#9B9895;
  --accent:#1B6B5E;--accent-bg:#EAF4F2;--accent-bd:#B8DDD8;
  --danger:#BE3B2A;--danger-bg:#FDF0EE;--danger-bd:#F1BDB7;
  --ok:#1A7A4A;--ok-bg:#EDFAF4;--ok-bd:#A8DFC0;
  --info:#1B5C9B;--info-bg:#EBF3FC;--info-bd:#AECDE8;
  --upf:#003DA5;
}
html{font-size:15px;}
body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 4rem;}
#prog-wrap{position:fixed;top:0;left:0;right:0;height:3px;background:var(--border);z-index:100;}
#prog-fill{height:100%;background:var(--accent);transition:width 0.5s ease;width:0%;}
.app{max-width:560px;margin:0 auto;padding:4rem 1.25rem 0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.75rem;
  box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);margin-bottom:.75rem;}
.char-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;
  margin-bottom:.75rem;display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--info-bg);color:var(--info);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.char-info{flex:1;min-width:0;}
.char-name-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.char-name{font-weight:600;font-size:13px;} .char-savings{font-size:12px;color:var(--muted);}
.char-sub{font-size:11px;color:var(--muted);margin-bottom:5px;}
.mood-bar-wrap{display:flex;align-items:center;gap:6px;}
.mood-bar-bg{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.mood-bar-fill{height:100%;border-radius:2px;transition:width .5s,background .5s;}
.mood-label{font-size:10px;color:var(--faint);white-space:nowrap;}
.tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);
  display:flex;align-items:center;gap:5px;margin-bottom:1rem;}
h2{font-size:1.25rem;font-weight:700;margin-bottom:.6rem;line-height:1.3;}
h3{font-size:1.05rem;font-weight:600;margin-bottom:.65rem;line-height:1.4;}
.story{font-family:'Lora',serif;font-size:.95rem;line-height:1.8;color:var(--muted);}
.prose{font-size:.875rem;line-height:1.7;color:var(--muted);}
.small{font-size:.8rem;line-height:1.65;color:var(--faint);}
button{cursor:pointer;font-family:'Manrope',sans-serif;font-size:13px;border:1px solid var(--border);
  border-radius:8px;background:transparent;color:var(--text);transition:background .15s,border-color .15s;}
button:hover{background:var(--bg);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);padding:.65rem 1.5rem;font-weight:700;font-size:14px;
  box-shadow:0 3px 10px rgba(27,107,94,0.35);transition:background .2s,box-shadow .2s,transform .15s;}
.btn-primary:hover{background:#155f53;box-shadow:0 5px 18px rgba(27,107,94,0.45);transform:translateY(-1px);} .btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);padding:.65rem 1.5rem;font-weight:600;font-size:14px;}
.btn-danger:hover{background:#a83220;}
.btn-wide{width:100%;padding:.7rem;font-weight:600;font-size:14px;}
.btn-wide.primary{background:var(--accent);color:#fff;border-color:var(--accent);
  box-shadow:0 3px 10px rgba(27,107,94,0.35);font-weight:700;transition:background .2s,box-shadow .2s,transform .15s;}
.btn-wide.primary:hover{background:#155f53;box-shadow:0 5px 18px rgba(27,107,94,0.45);transform:translateY(-1px);} .btn-wide.dim{opacity:.45;cursor:not-allowed;}
.choice-btn{width:100%;text-align:left;padding:.75rem 1rem;display:flex;justify-content:space-between;
  align-items:center;margin-bottom:8px;border-radius:10px;} .choice-btn:last-child{margin-bottom:0;}
.choice-detail{font-size:11px;color:var(--faint);}
.scale{display:flex;gap:5px;margin-bottom:5px;}
.scale button{flex:1;padding:.45rem 0;font-size:12px;text-align:center;border-radius:7px;}
.scale button.sel{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
.scale-labs{display:flex;justify-content:space-between;font-size:10px;color:var(--faint);}
.opt-row{display:flex;gap:6px;flex-wrap:wrap;}
.opt-row button{padding:.4rem .875rem;border-radius:7px;}
.opt-row button.sel{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;margin-bottom:.875rem;}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;}
.stat-row .lbl{color:var(--muted);} .stat-row .val{font-weight:600;}
.stat-sep{border-top:1px solid var(--border);padding-top:7px;margin-top:5px;}
.norm-box{border:1px solid var(--border);border-radius:10px;padding:.875rem 1rem;margin-bottom:.875rem;}
.norm-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:.4rem;}
.prev-badge{font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:.4rem .875rem;margin-bottom:.625rem;display:flex;justify-content:space-between;align-items:center;}
.letter{border-radius:10px;padding:1.1rem;margin-bottom:1.125rem;}
.letter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;}
.letter-title{font-weight:600;font-size:14px;margin-bottom:.4rem;}
.letter.ok{background:var(--ok-bg);border:1px solid var(--ok-bd);} .letter.ok .letter-label{color:var(--ok);}
.letter.danger{background:var(--danger-bg);border:1px solid var(--danger-bd);} .letter.danger .letter-label{color:var(--danger);}
input[type=range]{width:100%;accent-color:var(--accent);}
input[type=text],input[type=number]{width:100%;border:1px solid var(--border2);border-radius:8px;
  padding:.5rem .75rem;font-size:13px;background:var(--card);color:var(--text);font-family:'Manrope',sans-serif;}
input[type=text]:focus,input[type=number]:focus{outline:none;border-color:var(--accent);}
.summary-table{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1rem;}
.summary-table .hrow,.summary-table .drow{display:grid;grid-template-columns:1fr auto auto;font-size:12px;}
.summary-table .hrow>*,.summary-table .drow>*{padding:.55rem .875rem;}
.summary-table .hrow{background:var(--bg);font-weight:600;color:var(--muted);}
.summary-table .drow{border-top:1px solid var(--border);}
.summary-table .drow .d-val{text-align:right;font-weight:600;} .summary-table .drow .d-chg{text-align:right;padding-left:1.25rem;}
.badge{display:inline-block;font-size:10px;font-weight:600;border-radius:6px;padding:2px 8px;margin-left:7px;}
.badge.ok{background:var(--ok-bg);color:var(--ok);} .badge.danger{background:var(--danger-bg);color:var(--danger);}
.q-block{margin-bottom:1.375rem;border:1px solid transparent;border-radius:10px;padding:.125rem;transition:background .15s,border-color .15s;}
.q-block:last-child{margin-bottom:0;}
.q-block.missing,.conditional-block.missing{background:var(--danger-bg);border-color:var(--danger-bd);padding:.875rem 1rem;}
.q-label{font-size:14px;line-height:1.6;margin-bottom:.65rem;}
.q-sublabel{font-size:12px;color:var(--muted);margin-bottom:.5rem;}
.missing-msg{font-size:12px;color:var(--danger);font-weight:600;margin-top:.5rem;}
.form-alert{background:var(--danger-bg);border:1px solid var(--danger-bd);color:var(--danger);border-radius:10px;padding:.75rem 1rem;font-size:13px;line-height:1.55;margin-bottom:1rem;font-weight:600;}
.country-select{width:100%;border:1px solid var(--border2);border-radius:8px;padding:.5rem .75rem;font-size:13px;background:var(--card);color:var(--text);font-family:'Manrope',sans-serif;}
.country-select:focus{outline:none;border-color:var(--accent);}
.decision-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:1.375rem;}
.decision-actions .back-btn{font-size:12px;color:var(--muted);padding:.55rem .75rem;border-color:var(--border);background:transparent;cursor:pointer;}
.decision-actions .secondary-btn{padding:.65rem 1rem;font-weight:600;font-size:13px;background:var(--card);color:var(--text);}
.divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0;}
.center{text-align:center;} .big-icon{font-size:3rem;margin-bottom:1.25rem;}
.data-box{background:#1A1917;color:#E8E6E0;border-radius:10px;padding:1rem;font-family:'Courier New',monospace;
  font-size:11px;line-height:1.65;overflow-x:auto;margin-bottom:1rem;max-height:260px;overflow-y:auto;}
.data-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.data-actions button{padding:.5rem 1rem;font-size:13px;font-weight:500;}
.exp-toggle{font-size:11px;padding:.3rem .75rem;color:var(--faint);border-color:var(--border);}
.exp-panel{margin-top:7px;padding:1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:12px;}
.exp-panel h4{font-size:13px;font-weight:600;margin-bottom:.875rem;}
.exp-grid{display:grid;grid-template-columns:auto 1fr auto;gap:4px 10px;margin-bottom:.5rem;}
.exp-key{color:var(--faint);}
.exp-note{font-size:11px;color:var(--faint);border-top:1px solid var(--border);padding-top:.75rem;margin-top:.75rem;}
.exp-btns{display:flex;gap:6px;flex-wrap:wrap;}
.exp-btns button{font-size:11px;padding:.3rem .75rem;border-radius:6px;}
.exp-btns button.sel{background:var(--info-bg);color:var(--info);border-color:var(--info-bd);}
.stage-pill{display:inline-block;font-size:10px;font-weight:700;background:var(--accent);color:#fff;
  border-radius:20px;padding:3px 12px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:1rem;}
.section-divider{display:flex;align-items:center;gap:10px;margin:1.25rem 0;}
.section-divider span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);white-space:nowrap;}
.section-divider::before,.section-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.conditional-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.875rem 1rem;margin-top:.5rem;}
.consent-header{background:var(--upf);color:#fff;border-radius:10px 10px 0 0;padding:1.25rem 1.75rem;margin:-1.75rem -1.75rem 1.5rem;}
.consent-logo{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;opacity:.75;margin-bottom:4px;}
.consent-title{font-size:1.1rem;font-weight:700;line-height:1.3;} .consent-meta{font-size:11px;opacity:.7;margin-top:4px;}
.consent-section{margin-bottom:1.25rem;}
.consent-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text);margin-bottom:.5rem;}
.consent-section p,.consent-section li{font-size:13px;line-height:1.7;color:var(--muted);}
.consent-section ul{padding-left:1.1rem;margin-top:.25rem;} .consent-section ul li{margin-bottom:3px;}
.consent-section a{color:var(--accent);}
.consent-agree-box{background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;}
.consent-agree-box ul{padding-left:1.1rem;margin-top:.35rem;}
.consent-agree-box ul li{font-size:13px;line-height:1.7;color:var(--text);margin-bottom:2px;}
.consent-btns{display:flex;gap:10px;flex-wrap:wrap;}
details summary{cursor:pointer;font-weight:600;font-size:12px;color:var(--text);margin-bottom:.5rem;}
.reveal-box{border-radius:12px;padding:1.25rem;margin-bottom:1.125rem;text-align:center;}
.reveal-box.ok{background:var(--ok-bg);border:1px solid var(--ok-bd);}
.reveal-box.danger{background:var(--danger-bg);border:1px solid var(--danger-bd);}
.reveal-emoji{font-size:2.5rem;margin-bottom:.5rem;}
.reveal-verdict{font-weight:700;font-size:1.1rem;margin-bottom:.35rem;}
.reveal-desc{font-size:13px;line-height:1.65;}
.reveal-box.ok .reveal-verdict{color:var(--ok);} .reveal-box.danger .reveal-verdict{color:var(--danger);}
</style>
</head>
<body>
<div id="prog-wrap"><div id="prog-fill"></div></div>
<div class="app">
  <div id="char-bar-wrap"></div>
  <div class="card" id="main-card"></div>
  <div id="exp-wrap" style="margin-top:.5rem;"></div>
</div>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const INCOME     = 35000;   // median BSE graduate wage (2-yr post-master)
const TAX_RATE   = 0.30;    // world average income tax rate
const AUDIT_P    = 0.20;    // 20% — high enough to be salient, not so high it crowds out norms
const FINE_MULT  = 2;       // fine = FINE_MULT × undeclared tax
const RESEARCHER       = 'celina.ferrari@bse.eu \u00b7 thibault.jannin@bse.eu \u00b7 simone.distefano@bse.eu';
const RESEARCHER_ALL   = 'celina.ferrari@bse.eu \u00b7 thibault.jannin@bse.eu \u00b7 simone.distefano@bse.eu';
const RESEARCHER_LINKS = '<a href="mailto:celina.ferrari@bse.eu" style="color:var(--accent);">celina.ferrari@bse.eu</a> \u00b7 <a href="mailto:thibault.jannin@bse.eu" style="color:var(--accent);">thibault.jannin@bse.eu</a> \u00b7 <a href="mailto:simone.distefano@bse.eu" style="color:var(--accent);">simone.distefano@bse.eu</a>';
const SHEETS_ENDPOINT    = 'https://script.google.com/macros/s/AKfycbzXX5gUhjWtd6nh0s4i8EumdCu-o1SNj42A1gaDY5BYGEUnK8TnWIE3w75WIjFYNECN/exec'; // paste Google Apps Script URL here
const RESEARCHER_MODE = false;
// Society assignment threshold — corrected avg of Q1 + Q2 + (6−Q3), divided by 3
// Default: 3 (theoretical midpoint of 1–5 scale)
// After pilot: replace 3 with the empirical median from your pilot data
// e.g. if pilot median is 2.83, set SOCIETY_THRESHOLD = 2.83
const SOCIETY_THRESHOLD  = 3;
// Access code removed in version 15.

const COUNTRY_OPTIONS = [
  'Abkhazia','Afghanistan','Akrotiri and Dhekelia','Aland Islands','Albania','Algeria','American Samoa','Andorra','Angola','Anguilla','Antarctica','Antigua and Barbuda','Argentina','Armenia','Aruba','Artsakh / Nagorno-Karabakh','Australia','Austria','Azerbaijan',
  'Bahamas','Bahrain','Bangladesh','Barbados','Belarus','Belgium','Belize','Benin','Bermuda','Bhutan','Bolivia','Bonaire, Sint Eustatius and Saba','Bosnia and Herzegovina','Botswana','Bouvet Island','Brazil','British Indian Ocean Territory','British Virgin Islands','Brunei','Bulgaria','Burkina Faso','Burundi',
  'Cabo Verde','Cambodia','Cameroon','Canada','Cayman Islands','Central African Republic','Chad','Chile','China','Christmas Island','Cocos (Keeling) Islands','Colombia','Comoros','Congo','Cook Islands','Costa Rica','Cote d\'Ivoire','Croatia','Cuba','Curacao','Cyprus','Czechia',
  'Democratic Republic of the Congo','Denmark','Djibouti','Dominica','Dominican Republic',
  'Ecuador','Egypt','El Salvador','Equatorial Guinea','Eritrea','Estonia','Eswatini','Ethiopia',
  'Falkland Islands','Faroe Islands','Fiji','Finland','France','French Guiana','French Polynesia','French Southern Territories',
  'Gabon','Gambia','Georgia','Germany','Ghana','Gibraltar','Greece','Greenland','Grenada','Guadeloupe','Guam','Guatemala','Guernsey','Guinea','Guinea-Bissau','Guyana',
  'Haiti','Heard Island and McDonald Islands','Honduras','Hong Kong','Hungary',
  'Iceland','India','Indonesia','Iran','Iraq','Ireland','Isle of Man','Israel','Italy',
  'Jamaica','Japan','Jersey','Jordan',
  'Kazakhstan','Kenya','Kiribati','Kosovo','Kuwait','Kyrgyzstan',
  'Laos','Latvia','Lebanon','Lesotho','Liberia','Libya','Liechtenstein','Lithuania','Luxembourg',
  'Macao','Madagascar','Malawi','Malaysia','Maldives','Mali','Malta','Marshall Islands','Martinique','Mauritania','Mauritius','Mayotte','Mexico','Micronesia','Moldova','Monaco','Mongolia','Montenegro','Montserrat','Morocco','Mozambique','Myanmar',
  'Nagorno-Karabakh','Namibia','Nauru','Nepal','Netherlands','New Caledonia','New Zealand','Nicaragua','Niger','Nigeria','Niue','Norfolk Island','North Korea','North Macedonia','Northern Cyprus','Northern Mariana Islands','Norway',
  'Oman',
  'Pakistan','Palau','Palestine','Panama','Papua New Guinea','Paraguay','Peru','Philippines','Pitcairn','Poland','Portugal','Puerto Rico',
  'Qatar',
  'Reunion','Romania','Russia','Rwanda',
  'Saint Barthelemy','Saint Helena, Ascension and Tristan da Cunha','Saint Kitts and Nevis','Saint Lucia','Saint Martin','Saint Pierre and Miquelon','Saint Vincent and the Grenadines','Samoa','San Marino','Sao Tome and Principe','Saudi Arabia','Senegal','Serbia','Seychelles','Sierra Leone','Singapore','Sint Maarten','Slovakia','Slovenia','Solomon Islands','Somalia','Somaliland','South Africa','South Georgia and the South Sandwich Islands','South Korea','South Ossetia','South Sudan','Spain','Sri Lanka','Sudan','Suriname','Svalbard and Jan Mayen','Sweden','Switzerland','Syria',
  'Taiwan','Tajikistan','Tanzania','Thailand','Timor-Leste','Togo','Tokelau','Tonga','Transnistria','Trinidad and Tobago','Tunisia','Turkey','Turkmenistan','Turks and Caicos Islands','Tuvalu',
  'Uganda','Ukraine','United Arab Emirates','United Kingdom','United States','United States Minor Outlying Islands','United States Virgin Islands','Uruguay','Uzbekistan',
  'Vanuatu','Vatican City','Venezuela','Vietnam',
  'Wallis and Futuna','Western Sahara',

function countryOptionsHTML(selected){
  return '<option value="">Select your country or territory...</option>' + COUNTRY_OPTIONS.map(c=>`<option value="${c}" ${selected===c?'selected':''}>${c}</option>`).join('');
}

// ─── COUNTRY HELPERS ──────────────────────────────────────────────────────────
function getCity(c){
  const m={'brazil':'São Paulo','italy':'Milan','france':'Paris','spain':'Barcelona',
    'germany':'Berlin','uk':'London','england':'London','united kingdom':'London',
    'usa':'New York','united states':'New York','portugal':'Lisbon',
    'netherlands':'Amsterdam','belgium':'Brussels','sweden':'Stockholm',
    'norway':'Oslo','denmark':'Copenhagen','finland':'Helsinki','switzerland':'Zurich',
    'austria':'Vienna','greece':'Athens','turkey':'Istanbul','poland':'Warsaw',
    'mexico':'Mexico City','argentina':'Buenos Aires','colombia':'Bogotá',
    'chile':'Santiago','peru':'Lima','india':'Mumbai','china':'Shanghai',
    'japan':'Tokyo','south korea':'Seoul','indonesia':'Jakarta',

function getCurrency(c){
  return '€';
}

// ─── STATE ────────────────────────────────────────────────────────────────────
function makeId(){ return 'P-'+Math.random().toString(36).substr(2,8).toUpperCase(); }
let S = {
  phase:'consent',
  isBSE:null, fictitiousName:'', countryOfOrigin:'', city:'', currency:'€',
  corr:{trust:null,manage:null,direct:null},
  society:null, societySource:null, corrMean:null, corrMedian:null,
  normVal:Math.random()<0.5?'good':'bad',
  friendTreat:true,   // all participants see the friend counter-example story
  eIdx:0, savings:8000, happiness:72,
  r1Pct:100, r2Pct:100, r3Pct:100, r4Pct:100,
  r1:null, r2:null, r3:null, r4:null,
  auditResult:null,
  auditApplied:false,
  demo:{gender:null,age:'',paidTaxes:null,knowsAudited:null,auditOutcome:null,
        knowsEvader:null,moralScore:null,evasionEstimate:50,auditLikelihood:null,lotteryChoices:[null,null,null,null,null],profession:''},
  participantId:makeId(),
  sessionStart:new Date().toISOString(),
  phaseTimings:{},
  responseTimings:{},
  showPanel:false,
  validationErrors:[]
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const fmt    = n => S.currency+' '+Number(Math.round(n)).toLocaleString();
const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
const taxAmt = pct => Math.round(INCOME*pct/100*TAX_RATE);
const hCol   = h => h>65?'#1A7A4A':h>38?'#A06B12':'#BE3B2A';

const SQ=[
  {id:'trust', text:'How much do you trust public institutions in [C] to act in the public interest?', lo:'Not at all', hi:'Very much'},
  {id:'manage',text:'How well do you think public funds are managed and spent in [C]?',              lo:'Very poorly',  hi:'Very well'},
  {id:'direct',text:'Based on your personal experience, how corrupt do you feel the government is in [C]?',lo:'Not at all corrupt',hi:'Extremely corrupt'}
];

function surveyOk(){ return SQ.every(q=>S.corr[q.id]!==null); }
function preOk(){ return missingPre().length===0; }
function demoOk(){ return missingDemo().length===0; }
function isMissing(id){ return S.validationErrors.indexOf(id)>-1; }
function missingClass(id){ return isMissing(id)?' missing':''; }
function missingMsg(id){ return isMissing(id)?'<div class="missing-msg">Please answer this question before continuing.</div>':''; }
function validationAlertHTML(){
  return S.validationErrors.length?'<div class="form-alert">Please answer the highlighted question'+(S.validationErrors.length>1?'s':'')+' before continuing.</div>':'';
}
function showMissing(ids){
  S.validationErrors=ids;
  alert('Please answer all required questions before continuing. The unanswered question'+(ids.length>1?'s are':' is')+' highlighted on the page.');
  render();
}
function missingPre(){
  const ids=[];
  if(S.isBSE===null) ids.push('isBSE');
  if(S.isBSE!==null&&S.fictitiousName.trim()==='') ids.push('fictitiousName');
  if(S.countryOfOrigin.trim()==='') ids.push('countryOfOrigin');
  return ids;
}
function missingBackground(){ return SQ.filter(q=>S.corr[q.id]===null).map(q=>'background_'+q.id); }
function missingDemo(){
  const d=S.demo, ids=[];
  if(!d.gender) ids.push('gender');
  if(!d.age) ids.push('age');
  if(!d.paidTaxes) ids.push('paidTaxes');
  if(!d.knowsAudited) ids.push('knowsAudited');
  if(d.knowsAudited==='Yes'&&d.auditOutcome===null) ids.push('auditOutcome');
  if(!d.knowsEvader) ids.push('knowsEvader');
  if(!d.moralScore) ids.push('moralScore');
  if(!d.auditLikelihood) ids.push('auditLikelihood');
  if(!d.lotteryChoices.every(c=>c!==null)) ids.push('lotteryChoices');
  if(d.profession.trim()==='') ids.push('profession');
  return ids;
}

function deriveSociety(){
  const c1=S.corr.trust, c2=S.corr.manage, c3=6-S.corr.direct;
  const mean=(c1+c2+c3)/3;
  const median=[c1,c2,c3].sort((a,b)=>a-b)[1];  // middle value of three corrected scores
  S.corrMean=+mean.toFixed(2);
  S.corrMedian=median;
  if(median>SOCIETY_THRESHOLD) return {society:'good',source:'median='+median+', mean='+mean.toFixed(2)+', threshold='+SOCIETY_THRESHOLD};
  if(median<SOCIETY_THRESHOLD) return {society:'bad', source:'median='+median+', mean='+mean.toFixed(2)+', threshold='+SOCIETY_THRESHOLD};
  const rnd=Math.random()<0.5?'good':'bad';
  return {society:rnd,source:'randomised (median='+SOCIETY_THRESHOLD+', mean='+mean.toFixed(2)+')'};
}
function initAfterPrescreening(){
  S.validationErrors=[];
  S.city=getCity(S.countryOfOrigin); S.currency=getCurrency(S.countryOfOrigin); go('background');
}
function attemptPrescreening(){
  const missing=missingPre();
  if(missing.length){ showMissing(missing); return; }
  initAfterPrescreening();
}
function startGame(){
  S.validationErrors=[];
  const r=deriveSociety(); S.society=r.society; S.societySource=r.source; go('stage_intro');
}
function attemptBackground(){
  const missing=missingBackground();
  if(missing.length){ showMissing(missing); return; }
  startGame();
}
function finishStudy(){
  const missing=missingDemo();
  if(missing.length){ showMissing(missing); return; }
  S.validationErrors=[];
  _endPhase('demographics');
  applyAuditPenalty();
  submitToSheets();
  go('end');
}

function updatePreButton(){
  const btn=document.getElementById('pre-btn');
  if(!btn) return;

function _endPhase(phase){
  if(S.phaseTimings[phase]&&S.phaseTimings[phase].start){
    S.phaseTimings[phase].end=Date.now();
    S.phaseTimings[phase].duration_s=((S.phaseTimings[phase].end-S.phaseTimings[phase].start)/1000).toFixed(1);
  }
}
function recordResponse(qid,value){
  const now=Date.now();
  const phaseStart=S.phaseTimings[S.phase]&&S.phaseTimings[S.phase].start;
  const sessionStart=new Date(S.sessionStart).getTime();
  const elapsedMs=phaseStart?now-phaseStart:now-sessionStart;
  const r=S.responseTimings[qid]||{phase:S.phase,firstResponse_s:null,lastResponse_s:null,count:0,value:null};
  if(r.firstResponse_s===null) r.firstResponse_s=+(elapsedMs/1000).toFixed(2);
  r.lastResponse_s=+(elapsedMs/1000).toFixed(2);
  r.count+=1;
  r.value=value;
  r.phase=S.phase;
  S.responseTimings[qid]=r;
}
function go(phase){
  var timed=['prescreening','background','event','r1','desc_norm','r2','presc_norm','r3','friend_story','r4','transition','demographics','audit_reveal','debrief'];
  if(timed.indexOf(phase)>-1){
    S.phaseTimings[phase]=S.phaseTimings[phase]||{};
    S.phaseTimings[phase].start=Date.now();
  }
  S.phase=phase; render();
}

// ─── AUDIT COMPUTATION ────────────────────────────────────────────────────────
function computeAudit(){
  const finalPct = S.friendTreat&&S.r4!==null ? S.r4 : S.r3;
  const taxPaid  = taxAmt(finalPct);
  const fullTax  = taxAmt(100);
  const undeclared = fullTax - taxPaid;
  const audited  = finalPct<100 && Math.random()<AUDIT_P;
  const fine     = audited ? Math.round(undeclared*FINE_MULT) : 0;
  S.auditResult  = {audited, finalPct, taxPaid, fullTax, undeclared, fine};
}
function applyAuditPenalty(){
  if(S.auditApplied||!S.auditResult) return;
  S.savings -= S.auditResult.taxPaid;
  if(S.auditResult.audited) S.savings -= (S.auditResult.undeclared + S.auditResult.fine);
  S.auditApplied = true;
}

async function submitToSheets(){
  if(!SHEETS_ENDPOINT) return;
  try{ const fd=new FormData(); fd.append('data',JSON.stringify(buildData()));
    await fetch(SHEETS_ENDPOINT,{method:'POST',body:fd,mode:'no-cors'}); }
  catch(e){ console.warn('Sheets error:',e); }
}
function downloadJSON(){
  const blob=new Blob([JSON.stringify(buildData(),null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url; a.download='study_'+S.participantId+'_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function copyJSON(){
  navigator.clipboard.writeText(JSON.stringify(buildData(),null,2)).then(()=>{
    const btn=document.getElementById('copy-btn');
    if(btn){btn.textContent='✓ Copied';setTimeout(()=>{if(document.getElementById('copy-btn'))btn.textContent='Copy to clipboard';},2000);}

}

  if(p==='declined') return `
    <div class="center" style="padding:1rem 0;">
      <div class="big-icon">🙏</div><h2>Thank you for your time</h2>
      <p class="prose" style="max-width:340px;margin:.75rem auto 0;">As you have chosen not to participate, the survey is now closed. You may close this window.<br><br>If you have any questions, please contact ${RESEARCHER}.</p>
    </div>`;

  // PRESCREENING ─────────────────────────────────────────────────────────────
  if(p==='prescreening'){
    const ok=preOk();
    return `${tag('ti-clipboard-list','Pre-screening')}
      <h3 style="margin-bottom:.25rem;">A few questions before we begin</h3>
      <p class="prose" style="margin-bottom:1.375rem;">Your answers help us set up the study correctly. All information is kept confidential.</p>
      ${validationAlertHTML()}
      <div class="q-block${missingClass('isBSE')}">
        <p class="q-label">Are you currently taking an experimental economics course at BSE?</p>
        <div class="opt-row">${['Yes','No'].map(v=>`<button class="${S.isBSE===v?'sel':''}" onclick="recordResponse('is_bse_student','${v}');S.isBSE='${v}';S.validationErrors=S.validationErrors.filter(id=>id!=='isBSE');render();">${v}</button>`).join('')}</div>
        ${missingMsg('isBSE')}
        ${S.isBSE==='Yes'?`<div class="conditional-block${missingClass('fictitiousName')}"><p class="q-sublabel">Please enter the fictitious name assigned to you in your first session:</p>
          <input type="text" placeholder="e.g. Sofia Rossi" value="${S.fictitiousName}" oninput="recordResponse('fictitious_name','typed');S.fictitiousName=this.value;updatePreButton();">${missingMsg('fictitiousName')}</div>`:''}
        ${S.isBSE==='No'?`<div class="conditional-block${missingClass('fictitiousName')}"><p class="q-sublabel">Please choose a fictitious name you will use throughout this study (not your real name):</p>
          <input type="text" placeholder="e.g. Marco Bianchi" value="${S.fictitiousName}" oninput="recordResponse('fictitious_name','typed');S.fictitiousName=this.value;updatePreButton();">${missingMsg('fictitiousName')}</div>`:''}
      </div>
      <div class="q-block${missingClass('countryOfOrigin')}">
        <p class="q-label">What is your country or territory of origin?</p>
        <select class="country-select" onchange="recordResponse('country_of_origin',this.value);S.countryOfOrigin=this.value;S.validationErrors=S.validationErrors.filter(id=>id!=='countryOfOrigin');render();">
          ${countryOptionsHTML(S.countryOfOrigin)}
        </select>
        ${missingMsg('countryOfOrigin')}
      </div>
      <div style="margin-top:1.375rem;">
        <button class="btn-primary ${ok?'':'dim'}" id="pre-btn" onclick="attemptPrescreening()" style="${ok?'':'cursor:not-allowed;opacity:0.45;'}">
          Continue <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
      </div>`;
  }

  // BACKGROUND ───────────────────────────────────────────────────────────────
  if(p==='background'){
    const ok=surveyOk(), C=S.countryOfOrigin||'your country';
    return `${tag('ti-world','About your country')}
      <h3 style="margin-bottom:.25rem;">Background questions</h3>
      <p class="prose" style="margin-bottom:1.375rem;">Think about <strong>${C}</strong>. Rate the following on a scale from 1 to 5. There are no right or wrong answers.</p>
      ${validationAlertHTML()}
      ${SQ.map(q=>`<div class="q-block${missingClass('background_'+q.id)}">
        <p class="q-label">${q.text.replace('[C]',C)}</p>
        <div class="scale">${[1,2,3,4,5].map(v=>`<button class="${S.corr[q.id]===v?'sel':''}" onclick="recordResponse('background_${q.id}',${v});S.corr['${q.id}']=${v};S.validationErrors=S.validationErrors.filter(id=>id!=='background_${q.id}');render();">${v}</button>`).join('')}</div>
        <div class="scale-labs"><span>${q.lo}</span><span>${q.hi}</span></div>
        ${missingMsg('background_'+q.id)}
      </div>`).join('')}
      <div style="margin-top:1.375rem;">
        <button class="btn-primary ${ok?'':'dim'}" onclick="attemptBackground()" style="${ok?'':'cursor:not-allowed;opacity:0.45;'}">
          Continue <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
      </div>`;
  }

  // STAGE INTRO ──────────────────────────────────────────────────────────────
  if(p==='stage_intro') return `
    <div style="padding:.25rem 0;">
      <div class="stage-pill">Instructions</div>
      <p class="story" style="margin-bottom:1.25rem;border-left:3px solid var(--border);padding-left:1rem;font-style:italic;">You will receive information as you progress through the study. At each point, you will have everything you need to make your decision.</p>
      <h3>You will play as ${S.fictitiousName}</h3>
      <p class="prose" style="margin-bottom:1rem;">${S.fictitiousName} is a 27-year-old graphic designer living in <strong>${S.city}</strong>, ${S.countryOfOrigin}. You will face a series of everyday choices and four income declaration decisions. Each declaration is recorded.</p>
      <div style="background:var(--info-bg);border:1px solid var(--info-bd);border-radius:10px;padding:.875rem 1rem;margin-bottom:1rem;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--info);margin-bottom:.4rem;">Your starting savings</div>
        <p style="font-size:13px;color:var(--text);line-height:1.65;"><strong>${S.currency} 8,000</strong> — this is the amount ${S.fictitiousName} has set aside. It is the only figure that will change based on your choices during the game. Please take a moment to note this amount.</p>
      </div>
      ${statBox([['Name',S.fictitiousName],['City',S.city+', '+S.countryOfOrigin],['Annual income',fmt(INCOME)]])}
      <button class="btn-primary" onclick="go('event')">Begin <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>`;

  // EVENTS ───────────────────────────────────────────────────────────────────
  if(p==='event'){
    const evs=gameEvents(),ev=evs[S.eIdx];
    return `${tag('ti-'+ev.icon.replace('ti-',''),ev.tag)}<h3>${ev.title}</h3>
      <p class="story" style="margin-bottom:1.5rem;">${ev.body}</p>
      ${ev.choices.map((c,i)=>`<button class="choice-btn" onclick="handleChoice(${i})"><span>${c.label}</span><span class="choice-detail">${c.detail}</span></button>`).join('')}`;
  }

  // R1 ───────────────────────────────────────────────────────────────────────
  if(p==='r1') return `
    ${tag('ti-receipt','Income declaration')}
    <h3 style="margin-bottom:.5rem;">Time to file your annual return</h3>
    <p class="prose" style="margin-bottom:.5rem;">In ${S.countryOfOrigin||'your country'}, ${R1_CTX[S.society]}</p><p class="prose" style="margin-bottom:1rem;">It is March and your annual income declaration is due. How much of your income will you declare?</p>
    ${taxBlock('r1','r1Pct','Submit declaration')}`;

  // DESC NORM ────────────────────────────────────────────────────────────────
  if(p==='desc_norm'){ const d=DESC[S.normVal]; return `
    <div class="stage-pill">New information</div>
    ${tag('ti-news','New information')}
    <p class="story" style="margin-bottom:1rem;">While preparing your return, you come across a recent survey about income reporting behaviour in ${S.city}:</p>
    ${normBox(d)}
    <p class="prose" style="margin-bottom:0;">Would you like to change your declaration?</p>
    ${decisionActions("go('r1')","changeR2()","keepR2()")}`;}

  // R2 ───────────────────────────────────────────────────────────────────────
  if(p==='r2') return `
    <button onclick="go('desc_norm')" style="font-size:12px;color:var(--muted);padding:.3rem .5rem;border:none;background:transparent;margin-bottom:.75rem;cursor:pointer;"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to previous information</button>
    ${tag('ti-receipt','Income declaration')}
    ${prevBadge('Previous declaration',S.r1)}
    ${normBox(DESC[S.normVal])}
    ${taxBlock('r2','r2Pct','Submit updated decision')}`;

  // PRESC NORM ───────────────────────────────────────────────────────────────
  if(p==='presc_norm'){ const pr=PRESC[S.normVal]; return `
    <div class="stage-pill">New information</div>
    ${tag('ti-message-circle','New information')}
    <p class="story" style="margin-bottom:1rem;">You also come across a community attitudes survey conducted in ${S.city}:</p>
    ${normBox(pr)}
    <p class="prose" style="margin-bottom:0;">Would you like to change your declaration?</p>
    ${decisionActions("go('r2')","changeR3()","keepR3()")}`;}

  // R3 ───────────────────────────────────────────────────────────────────────
  if(p==='r3') return `
    <button onclick="go('presc_norm')" style="font-size:12px;color:var(--muted);padding:.3rem .5rem;border:none;background:transparent;margin-bottom:.75rem;cursor:pointer;"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to previous information</button>
    ${tag('ti-receipt','Income declaration')}
    ${prevBadge('Earlier declaration',S.r1)}
    ${prevBadge('Previous declaration',S.r2)}
    ${normBox(DESC[S.normVal])}${normBox(PRESC[S.normVal])}
    ${taxBlock('r3','r3Pct','Submit updated decision')}`;

  // FRIEND STORY ─────────────────────────────────────────────────────────────
  if(p==='friend_story'){ const fr=FRIEND[S.normVal]; return `
    ${tag('ti-'+fr.icon.replace('ti-',''),fr.lbl)}
    <p class="story" style="margin-bottom:1rem;">${fr.text}</p>
    <p class="prose" style="margin-bottom:0;">Would you like to change your declaration one final time?</p>
    ${decisionActions("go('r3')","changeR4()","keepR4()")}`;}

  // R4 ───────────────────────────────────────────────────────────────────────
  if(p==='r4') return `
    <button onclick="go('friend_story')" style="font-size:12px;color:var(--muted);padding:.3rem .5rem;border:none;background:transparent;margin-bottom:.75rem;cursor:pointer;"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back to previous information</button>
    ${tag('ti-receipt','Income declaration · Final decision')}
    ${prevBadge('Earlier declaration',S.r1)}
    ${prevBadge('Previous declaration',S.r2)}
    ${prevBadge('Most recent declaration',S.r3)}
    <div class="norm-box" style="background:var(--bg);">
      <div class="norm-lbl"><i class="ti ti-user-heart" aria-hidden="true" style="margin-right:4px;"></i>Your best friend's decision (counter-example)</div>
      <p class="prose">${FRIEND[S.normVal].text}</p>
    </div>
    ${taxBlock('r4','r4Pct','Submit final decision')}`;



  // TRANSITION ───────────────────────────────────────────────────────────────
  if(p==='transition') return `
    <div style="padding:.25rem 0;">
      <div class="stage-pill">Final section — Background questionnaire</div>
      <p class="story" style="margin-bottom:1.25rem;border-left:3px solid var(--border);padding-left:1rem;font-style:italic;">You have now completed the decision-making portion of the study. We will now ask you some general questions about your background and attitudes.</p>
      <p class="prose" style="margin-bottom:.875rem;">There are no right or wrong answers. Please answer honestly based on your own views and experiences.</p>
      <p class="prose" style="margin-bottom:1.375rem;font-style:italic;">The decision of whether you were audited will be revealed at the end.</p>
      <button class="btn-primary" onclick="go('demographics')">Begin final questions <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
    </div>`;

  // DEMOGRAPHICS ─────────────────────────────────────────────────────────────
  if(p==='demographics'){
    const d=S.demo,ok=demoOk(),C=S.countryOfOrigin||'your country';
    return `${tag('ti-user','Background questionnaire')}
      ${validationAlertHTML()}
      <div class="q-block${missingClass('gender')}"><p class="q-label">What is your gender?</p>
        <div class="opt-row">${['Man','Woman','Non-binary','Prefer not to say'].map(o=>`<button class="${d.gender===o?'sel':''}" onclick="recordResponse('gender','${o}');S.demo.gender='${o}';S.validationErrors=S.validationErrors.filter(id=>id!=='gender');render();">${o}</button>`).join('')}</div>${missingMsg('gender')}</div>
      <div class="q-block${missingClass('age')}"><p class="q-label">How old are you?</p>
        <input type="number" min="18" max="99" placeholder="Years" value="${d.age}" oninput="recordResponse('age','typed');S.demo.age=this.value;" style="max-width:120px;">${missingMsg('age')}</div>
      <div class="q-block${missingClass('paidTaxes')}"><p class="q-label">Have you ever personally filed or paid income taxes?</p>
        <div class="opt-row">${['Yes','No'].map(o=>`<button class="${d.paidTaxes===o?'sel':''}" onclick="recordResponse('paid_taxes','${o}');S.demo.paidTaxes='${o}';S.validationErrors=S.validationErrors.filter(id=>id!=='paidTaxes');render();">${o}</button>`).join('')}</div>${missingMsg('paidTaxes')}</div>
      <div class="q-block${missingClass('knowsAudited')}"><p class="q-label">Do you personally know anyone who has been subject to a tax audit?</p>
        <div class="opt-row">${['Yes','No'].map(o=>`<button class="${d.knowsAudited===o?'sel':''}" onclick="recordResponse('knows_audited','${o}');S.demo.knowsAudited='${o}';if('${o}'!=='Yes')S.demo.auditOutcome=null;S.validationErrors=S.validationErrors.filter(id=>id!=='knowsAudited'&&id!=='auditOutcome');render();">${o}</button>`).join('')}</div>
        ${missingMsg('knowsAudited')}
        ${d.knowsAudited==='Yes'?`<div class="conditional-block${missingClass('auditOutcome')}"><p class="q-sublabel">What was the outcome?</p>
          <div class="opt-row">${['They were found compliant','They faced a penalty','I do not know the outcome'].map(o=>`<button class="${d.auditOutcome===o?'sel':''}" onclick="recordResponse('audit_outcome','${o}');S.demo.auditOutcome='${o}';S.validationErrors=S.validationErrors.filter(id=>id!=='auditOutcome');render();">${o}</button>`).join('')}</div>${missingMsg('auditOutcome')}</div>`:''}
      </div>
      <div class="q-block${missingClass('knowsEvader')}"><p class="q-label">Do you personally know anyone who has, to your knowledge, underreported income or avoided paying taxes?</p>
        <div class="opt-row">${['Yes','No','Unsure'].map(o=>`<button class="${d.knowsEvader===o?'sel':''}" onclick="recordResponse('knows_evader','${o}');S.demo.knowsEvader='${o}';S.validationErrors=S.validationErrors.filter(id=>id!=='knowsEvader');render();">${o}</button>`).join('')}</div>${missingMsg('knowsEvader')}</div>
      <div class="q-block${missingClass('moralScore')}"><p class="q-label">How morally wrong do you personally think it is to underreport income to avoid paying taxes?</p>
        <div class="scale">${[1,2,3,4,5].map(v=>`<button class="${d.moralScore===v?'sel':''}" onclick="recordResponse('moral_wrongness',${v});S.demo.moralScore=${v};S.validationErrors=S.validationErrors.filter(id=>id!=='moralScore');render();">${v}</button>`).join('')}</div>
        <div class="scale-labs"><span>Not wrong at all</span><span>Very wrong</span></div>${missingMsg('moralScore')}</div>
      <div class="q-block"><p class="q-label">What percentage of people in ${C} do you think underreport their income? Choose the closest decile.</p>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
          <input type="range" min="0" max="100" step="10" value="${d.evasionEstimate}" style="flex:1;"
            oninput="recordResponse('evasion_estimate_percent',parseInt(this.value));S.demo.evasionEstimate=parseInt(this.value);document.getElementById('ev-val').textContent=this.value+'%';">
          <span id="ev-val" style="font-weight:600;font-size:13px;white-space:nowrap;">${d.evasionEstimate}%</span>
        </div>
        <div class="scale-labs"><span>0% — nobody</span><span>100% — everyone</span></div></div>
      <div class="q-block${missingClass('auditLikelihood')}"><p class="q-label">How likely do you think it is that someone who underreports their income will be caught?</p>
        <div class="scale">${[1,2,3,4,5].map(v=>`<button class="${d.auditLikelihood===v?'sel':''}" onclick="recordResponse('audit_likelihood',${v});S.demo.auditLikelihood=${v};S.validationErrors=S.validationErrors.filter(id=>id!=='auditLikelihood');render();">${v}</button>`).join('')}</div>
        <div class="scale-labs"><span>Very unlikely</span><span>Very likely</span></div>${missingMsg('auditLikelihood')}</div>
      <div class="q-block${missingClass('lotteryChoices')}">${lotteryGrid()}${missingMsg('lotteryChoices')}</div>
      <div class="q-block${missingClass('profession')}"><p class="q-label">What is your current field of study or profession?</p>
        <input type="text" placeholder="e.g. Economics, Medicine, Engineering…" value="${d.profession}" oninput="recordResponse('profession','typed');S.demo.profession=this.value;">${missingMsg('profession')}</div>
      <div style="margin-top:1.375rem;">
        <button class="btn-wide primary ${ok?'':'dim'}" onclick="finishStudy()" style="${ok?'':'cursor:not-allowed;opacity:0.45;'}">
          Submit questionnaire <i class="ti ti-arrow-right" aria-hidden="true"></i>
        </button>
      </div>`;
  }

  // DEBRIEF ──────────────────────────────────────────────────────────────────
  if(p==='debrief') return ``;

  // END ──────────────────────────────────────────────────────────────────────
  if(p==='end'){
    const ar=S.auditResult;
    const finalPct=ar?ar.finalPct:100;
    const auditBox=!ar?'':finalPct===100?`
      <div class="reveal-box ok">
        <div class="reveal-emoji">✅</div>
        <div class="reveal-verdict">Not selected for audit</div>
        <p class="reveal-desc">You declared your full income of ${fmt(INCOME)} and paid ${fmt(ar.taxPaid)} in tax. No discrepancies were found.</p>
      </div>`:!ar.audited?`
      <div class="reveal-box ok">
        <div class="reveal-emoji">✓</div>
        <div class="reveal-verdict">Not selected for audit</div>
        <p class="reveal-desc">Your return was processed without further review. You declared ${finalPct}% of your income and paid ${fmt(ar.taxPaid)} in tax. No audit was triggered this time.</p>
      </div>`:`
      <div class="reveal-box danger">
        <div class="reveal-emoji">⚠️</div>
        <div class="reveal-verdict">Selected for audit - discrepancy found</div>
        <p class="reveal-desc">A discrepancy was found between your declared income (${finalPct}%) and records held by the authority. The undeclared tax plus penalty was deducted from your scenario savings.</p>
      </div>`;
    const auditStats=ar?statBox([
      ['Income declared',fmt(Math.round(INCOME*finalPct/100))+' ('+finalPct+'%)'],
      ['Tax paid',fmt(ar.taxPaid)],
      ['Undeclared tax',fmt(ar.undeclared)],
      ['Fine',fmt(ar.fine)],
      ['Final savings',fmt(S.savings)]
    ]):'';
    return `
    ${tag('ti-info-circle','Study complete')}
    <h3 style="margin-bottom:.75rem;">Thank you for participating</h3>
    <p class="prose" style="margin-bottom:1rem;">Your responses have been submitted. You may now close this window.</p>
    ${auditBox}
    ${auditStats}
    <div class="section-divider"><span>About the experiment</span></div>
    <p class="prose" style="margin-bottom:1rem;">This study examined how personal attitudes and social context influence economic decision-making. We were specifically interested in whether people's prior experience of institutional corruption shapes how they respond to social norm information when making income reporting decisions.</p>
    <p class="prose" style="margin-bottom:1rem;">Your responses are completely confidential and will only be analysed at the group level. The scenarios you encountered were entirely hypothetical and designed to vary systematically across participants.</p>
    <p class="prose" style="margin-bottom:0;">If you have any questions, please contact: ${RESEARCHER_LINKS}.</p>`;
  }
  return '';
}

// ─── CHAR BAR ─────────────────────────────────────────────────────────────────
function charBarHTML(){
  const hidden=['consent','declined','prescreening','background','stage_intro','transition','demographics','debrief','end'].includes(S.phase);
  if(hidden) return '';
  const hc=hCol(S.happiness);
  const initials=S.fictitiousName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
  return `<div class="char-bar">
    <div class="avatar">${initials}</div>
    <div class="char-info">
      <div class="char-name-row"><span class="char-name">${S.fictitiousName}</span><span class="char-savings">${fmt(S.savings)} saved</span></div>
      <div class="char-sub">${S.city||S.countryOfOrigin} · ${fmt(INCOME)}/yr</div>
      <div class="mood-bar-wrap">
        <div class="mood-bar-bg"><div class="mood-bar-fill" style="width:${S.happiness}%;background:${hc};"></div></div>
        <span class="mood-label">mood ${S.happiness}</span>
      </div>
    </div>
  </div>`;
}

  let inner='';
  if(S.showPanel) inner=`<div class="exp-panel">
    <h4>Session — ${S.participantId}</h4>

        <span class="exp-key">mean</span><span style="color:var(--muted);">for reference</span><span style="font-weight:600;">${S.corrMean??'—'}</span>
      </div>
      ${S.societySource?`<div style="font-size:11px;color:var(--faint);margin-top:4px;">Source: ${S.societySource}</div>`:''}
    </div>
    <div style="margin-bottom:.875rem;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">Treatments</div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <span style="font-size:11px;color:var(--muted);">Norm:</span>
        <div class="exp-btns">${['good','bad'].map(v=>`<button class="${S.normVal===v?'sel':''}" onclick="S.normVal='${v}';render();">${v}</button>`).join('')}</div>
        <span style="font-size:11px;color:var(--muted);">Friend counter-example:</span>
        <div class="exp-btns">${[true,false].map(v=>`<button class="${S.friendTreat===v?'sel':''}" onclick="S.friendTreat=${v};render();">${v?'yes':'no'}</button>`).join('')}</div>
      </div>
    </div>
    ${S.r1!==null?`<div style="border-top:1px solid var(--border);padding-top:.875rem;">
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;">Decisions</div>
      <div style="display:grid;grid-template-columns:auto 1fr auto auto;gap:4px 10px;font-size:12px;">
        <span class="exp-key">R1</span><span>Baseline</span><span style="font-weight:600;">${S.r1}%</span><span>—</span>
        <span class="exp-key">R2</span><span>Descriptive norm</span><span style="font-weight:600;">${S.r2!==null?S.r2+'%':'—'}</span><span style="color:${S.r2>S.r1?'var(--ok)':S.r2<S.r1?'var(--danger)':'var(--faint)'};font-weight:600;">${S.r2!==null?`(${S.r2>S.r1?'+':''}${S.r2-S.r1}pp)`:'—'}</span>
        <span class="exp-key">R3</span><span>Prescriptive norm</span><span style="font-weight:600;">${S.r3!==null?S.r3+'%':'—'}</span><span style="color:${S.r3!==null&&S.r3>S.r2?'var(--ok)':S.r3!==null&&S.r3<S.r2?'var(--danger)':'var(--faint)'};font-weight:600;">${S.r3!==null&&S.r2!==null?`(${S.r3>S.r2?'+':''}${S.r3-S.r2}pp)`:'—'}</span>
        ${S.friendTreat?`<span class="exp-key">R4</span><span>Friend counter-example</span><span style="font-weight:600;">${S.r4!==null?S.r4+'%':'—'}</span><span style="color:${S.r4!==null&&S.r4>S.r3?'var(--ok)':S.r4!==null&&S.r4<S.r3?'var(--danger)':'var(--faint)'};font-weight:600;">${S.r4!==null&&S.r3!==null?'('+(S.r4>S.r3?'+':'')+(S.r4-S.r3)+'pp)':'—'}</span>`:''}
      </div>
      ${S.auditResult?`<div style="display:flex;justify-content:space-between;margin-top:6px;padding-top:5px;border-top:1px solid var(--border);font-size:12px;">
        <span style="color:var(--muted);">Audit outcome</span>
        <span style="font-weight:600;color:${S.auditResult.audited?'var(--danger)':'var(--ok)'};">${S.auditResult.audited?'Audited · fine '+fmt(S.auditResult.fine):'Not audited'}</span>
      </div>`:''}
    </div>`:''}
    <div class="exp-note">INCOME=${fmt(INCOME)} · TAX=${(TAX_RATE*100).toFixed(0)}% · AUDIT=${(AUDIT_P*100).toFixed(0)}% · Society: survey-derived · Norm: randomised · Friend counter-example: shown to all</div>
  </div>`;
  if(!RESEARCHER_MODE) return '';
  return `<div><button class="exp-toggle" onclick="S.showPanel=!S.showPanel;render();"><i class="ti ti-settings" aria-hidden="true" style="margin-right:4px;"></i>Experimenter panel</button>${inner}</div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────


function pickLottery(row,choice){ recordResponse('lottery_'+(row+1),choice); S.demo.lotteryChoices[row]=choice; if(S.demo.lotteryChoices.every(c=>c!==null)) S.validationErrors=S.validationErrors.filter(id=>id!=='lotteryChoices'); render(); }

function lotteryGrid(){
  var safe=Math.max(0,Math.round(S.savings));
  var high=Math.max(safe+1,Math.round(S.savings*1.10));
  var low=Math.max(0,Math.round(S.savings*0.90));
  var rows=[
    '10% chance of '+fmt(high)+', otherwise '+fmt(low),
    '30% chance of '+fmt(high)+', otherwise '+fmt(low),
    '50% chance of '+fmt(high)+', otherwise '+fmt(low),
    '70% chance of '+fmt(high)+', otherwise '+fmt(low),
    '90% chance of '+fmt(high)+', otherwise '+fmt(low)
  ];
  var selSt='background:var(--info-bg);color:var(--info);border-color:var(--info-bd);font-weight:700;border-radius:7px;';
  var h='<p class="q-label">For each decision below, choose between keeping your current savings for certain and taking a gamble over your final savings. There are no right or wrong answers.</p>';
  h+='<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:.5rem;">';
  h+='<div style="display:grid;grid-template-columns:2rem 1fr 1fr;font-size:12px;">';
  h+='<div style="padding:.5rem;background:var(--bg);font-weight:600;color:var(--muted);">#</div>';
  h+='<div style="padding:.5rem .75rem;background:var(--bg);font-weight:600;color:var(--muted);">Option A \u2014 Current savings</div>';
  h+='<div style="padding:.5rem .75rem;background:var(--bg);font-weight:600;color:var(--muted);">Option B \u2014 Gamble over final savings</div>';
  for(var i=0;i<rows.length;i++){
    var chA=S.demo.lotteryChoices[i]==='A';
    var chB=S.demo.lotteryChoices[i]==='B';
    h+='<div style="padding:.5rem;border-top:1px solid var(--border);font-size:11px;font-weight:700;color:var(--faint);display:flex;align-items:center;">'+(i+1)+'</div>';
    h+='<div style="padding:.35rem .4rem;border-top:1px solid var(--border);">';
    h+='<button onclick="pickLottery('+i+',\'A\')" style="width:100%;padding:.4rem .6rem;font-size:12px;text-align:left;border-radius:7px;'+(chA?selSt:'')+'\">';
    h+=fmt(safe)+' for certain</button></div>';
    h+='<div style="padding:.35rem .4rem;border-top:1px solid var(--border);">';
    h+='<button onclick="pickLottery('+i+',\'B\')" style="width:100%;padding:.4rem .6rem;font-size:12px;text-align:left;border-radius:7px;'+(chB?selSt:'')+'\">';
    h+=rows[i]+'</button></div>';
  }
  h+='</div></div>';
  h+='<p style="font-size:11px;color:var(--faint);margin-top:.5rem;">Option A is your current savings for certain. Option B is a gamble: the chance of ending with the higher savings amount increases with each row.</p>';
  return h;
}

let _lastPhase='';
function render(){
  document.getElementById('char-bar-wrap').innerHTML=charBarHTML();
  document.getElementById('main-card').innerHTML=screenHTML();
  document.getElementById('exp-wrap').innerHTML=expPanelHTML();
  updateProgress();
  if(S.phase!==_lastPhase){ window.scrollTo({top:0,behavior:'smooth'}); _lastPhase=S.phase; }
}
render();
</script>
</body>
</html>
